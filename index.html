<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>About me</title>
  <link rel="icon" type="image/svg+xml" href="icon.svg" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <canvas id="canvas"></canvas>
  <script type="module">
    import { prepareWithSegments, layoutNextLine } from 'https://esm.sh/@chenglou/pretext'
    import { initCursor, drawCursor, getCursorObstacle } from './js/cursor.js'

    // ── Config ───────────────────────────────────────────────────────────────────
    const FONT_SIZE     = 17
    const FONT          = `${FONT_SIZE}px Georgia`
    const LINE_H        = 26
    const PARA_GAP      = Math.round(LINE_H * 0.7)  // extra space between paragraphs
    const MARGIN_Y      = 64
    const COL_GAP       = 48
    const MAX_CONTENT_W = 820
    const DROP_LETTER   = 'A'
    const DROP_LINES    = 3

    const PARAS_L = [
      `ndrey is a software developer based in Brazil, crafting digital experiences with a focus on clarity and elegance.`,
      `Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.`,
      `Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam eaque ipsa quae ab illo inventore veritatis. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt. Neque porro quisquam est qui dolorem ipsum quia dolor sit amet consectetur adipisci velit sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem. Ut enim ad minima veniam quis nostrum exercitationem ullam corporis suscipit laboriosam nisi ut aliquid ex ea commodi consequatur.`,
    ]

    const PARAS_R = [
      `Lorem ipsum dolor sit amet, consectetur adipiscing elit, sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.`,
      `Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt.`,
      `Neque porro quisquam est qui dolorem ipsum quia dolor sit amet consectetur adipisci velit sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem. Ut enim ad minima veniam quis nostrum exercitationem ullam corporis suscipit laboriosam nisi ut aliquid ex ea commodi consequatur. Quis autem vel eum iure reprehenderit qui in ea voluptate velit esse quam nihil molestiae consequatur vel illum dolorem eum fugiat.`,
    ]

    // ── State ────────────────────────────────────────────────────────────────────
    const canvas = document.getElementById('canvas')
    const ctx    = canvas.getContext('2d')

    let prepsL   = null
    let prepsR   = null
    let dropCapW = 0

    const contentW = () => Math.min(canvas.width - 80, MAX_CONTENT_W)
    const marginX  = () => Math.floor((canvas.width - contentW()) / 2)
    const colW     = () => Math.floor((contentW() - COL_GAP) / 2)
    const colLX    = () => marginX()
    const colRX    = () => marginX() + colW() + COL_GAP

    // ── Draw one line, splitting around cursor obstacle if needed ─────────────
    function drawLine(prep, cursor, y, cx, cw) {
      const midY  = y + LINE_H / 2
      const cxEnd = cx + cw
      const obs   = getCursorObstacle()

      if (!obs || midY < obs.top || midY > obs.bot || obs.right <= cx || obs.left >= cxEnd) {
        const line = layoutNextLine(prep, cursor, cw)
        if (!line) return null
        ctx.fillText(line.text, cx, y)
        return line.end
      }

      const leftW = Math.max(0, Math.min(obs.left, cxEnd) - cx)
      const rgtX  = Math.max(cx, obs.right)
      const rgtW  = Math.max(0, cxEnd - rgtX)

      if (leftW < 20 && rgtW < 20) return cursor

      let cur = cursor
      if (leftW >= 20) {
        const line = layoutNextLine(prep, cur, leftW)
        if (!line) return null
        ctx.fillText(line.text, cx, y)
        cur = line.end
      }
      if (rgtW >= 20) {
        const line = layoutNextLine(prep, cur, rgtW)
        if (!line) return null
        ctx.fillText(line.text, rgtX, y)
        cur = line.end
      }
      return cur
    }

    function drawColumn(preps, colX, colWidth, isLeft) {
      if (!preps) return
      ctx.font         = FONT
      ctx.fillStyle    = '#000'
      ctx.textBaseline = 'top'

      let y       = MARGIN_Y
      let lineIdx = 0
      const maxY  = canvas.height - MARGIN_Y

      for (const prep of preps) {
        if (y >= maxY) break
        let cursor = { segmentIndex: 0, graphemeIndex: 0 }

        while (y < maxY) {
          let cx = colX
          let cw = colWidth
          if (isLeft && lineIdx < DROP_LINES) {
            const dcEnd = colX + dropCapW
            if (cx < dcEnd) { cw -= (dcEnd - cx); cx = dcEnd }
          }
          if (cw >= 20) {
            const next = drawLine(prep, cursor, y, cx, cw)
            if (next === null) break
            cursor = next
          }
          y += LINE_H
          lineIdx++
        }
        y += PARA_GAP
      }
    }

    // ── Render ───────────────────────────────────────────────────────────────────
    function render() {
      if (!prepsL || !prepsR) { requestAnimationFrame(render); return }

      ctx.fillStyle = '#ffffff'
      ctx.fillRect(0, 0, canvas.width, canvas.height)

      const cw = colW()
      const lx = colLX()
      const rx = colRX()

      // Drop cap
      const dcSize = Math.round(LINE_H * DROP_LINES * 0.88)
      ctx.font         = `${dcSize}px Georgia`
      ctx.fillStyle    = '#000'
      ctx.textBaseline = 'top'
      ctx.fillText(DROP_LETTER, lx, MARGIN_Y - 2)

      drawColumn(prepsL, lx, cw, true)
      drawColumn(prepsR, rx, cw, false)

      drawCursor(ctx)

      requestAnimationFrame(render)
    }

    // ── Init ─────────────────────────────────────────────────────────────────────
    function resize() {
      canvas.width  = window.innerWidth
      canvas.height = window.innerHeight
    }

    window.addEventListener('resize', resize)

    async function init() {
      resize()
      initCursor(canvas)

      await document.fonts.ready

      const dcSize = Math.round(LINE_H * DROP_LINES * 0.88)
      ctx.font = `${dcSize}px Georgia`
      dropCapW = ctx.measureText(DROP_LETTER).width + 12

      prepsL = PARAS_L.map(p => prepareWithSegments(p, FONT))
      prepsR = PARAS_R.map(p => prepareWithSegments(p, FONT))

      render()
    }

    init()
  </script>
</body>
</html>
